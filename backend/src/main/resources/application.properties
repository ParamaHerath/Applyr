spring.application.name=api

spring.datasource.url=jdbc:postgresql://localhost:5432/applyr
spring.datasource.username=postgres
spring.datasource.password=Pass1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Secret: base64-encoded key, minimum 256 bits for HS256.
# This is a dev default — override via environment variable JWT_SECRET in production.
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNlY3VyZSBkZXZlbG9wbWVudCBzZWNyZXQga2V5IGZvciBhcHBseXIgdGhhdCBpcyBsb25nIGVub3VnaA==}

# Token validity in milliseconds. Default: 24 hours (86400000).
# Override via JWT_EXPIRATION_MS env var.
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
